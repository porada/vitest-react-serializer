version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 1

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    versioning-strategy: increase
    cooldown:
      default-days: 1
      exclude:
        - '@prettier/*'
        - '@standard-config/*'
        - '@vitest/*'
        - prettier
        - vitest
